version: "3.9"

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "5"

services:
  db:
    image: postgres:15-alpine
    container_name: zephyra_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-zephyra}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin}
      POSTGRES_DB: ${POSTGRES_DB:-pharmacy_db}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    logging: *default-logging

  redis:
    image: redis:7-alpine
    container_name: zephyra_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    logging: *default-logging

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: zephyra_backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-zephyra}:${POSTGRES_PASSWORD:-admin}@db:5432/${POSTGRES_DB:-pharmacy_db}
      - REDIS_URL=redis://redis:6379/0
      - GROQ_API_KEY=${GROQ_API_KEY}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN}
      - SENDGRID_API_KEY=${SENDGRID_API_KEY}
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app # For hot reloading
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    logging: *default-logging

volumes:
  pgdata:
  redisdata:
